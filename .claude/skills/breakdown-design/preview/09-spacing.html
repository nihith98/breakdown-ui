<!doctype html>
<!-- @dsCard group="Spacing" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--bg-page);
    color: var(--fg-primary);
    font-family: var(--font-sans);
    padding: 24px 32px;
  }
  .stack { display: grid; gap: 8px; }
  .row { display: grid; grid-template-columns: 60px 80px 1fr; align-items: center; gap: 16px; }
  .tok { font-family: var(--font-mono); font-size: 12px; color: var(--fg-secondary); }
  .val { font-family: var(--font-mono); font-size: 12px; color: var(--fg-primary); }
  .bar { background: var(--accent); height: 8px; border-radius: 2px; }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><span class="tok">--xs</span><span class="val">4 px</span><div class="bar" style="width:4px;"></div></div>
    <div class="row"><span class="tok">--sm</span><span class="val">8 px</span><div class="bar" style="width:8px;"></div></div>
    <div class="row"><span class="tok">--md</span><span class="val">12 px</span><div class="bar" style="width:12px;"></div></div>
    <div class="row"><span class="tok">--lg</span><span class="val">16 px</span><div class="bar" style="width:16px;"></div></div>
    <div class="row"><span class="tok">--xl</span><span class="val">20 px</span><div class="bar" style="width:20px;"></div></div>
    <div class="row"><span class="tok">--2xl</span><span class="val">24 px</span><div class="bar" style="width:24px;"></div></div>
    <div class="row"><span class="tok">--3xl</span><span class="val">32 px</span><div class="bar" style="width:32px;"></div></div>
    <div class="row"><span class="tok">--4xl</span><span class="val">40 px</span><div class="bar" style="width:40px;"></div></div>
  </div>
</body>
</html>

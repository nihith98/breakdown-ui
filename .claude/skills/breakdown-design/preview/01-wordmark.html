<!doctype html>
<!-- @dsCard group="Brand" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg-page);
    color: var(--fg-primary);
    font-family: var(--font-sans);
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    padding: 32px 40px;
    gap: 32px;
    box-sizing: border-box;
  }
  .wordmark {
    font-size: 56px;
    font-weight: 700;
    letter-spacing: -0.05em;
    color: var(--fg-primary);
    line-height: 1;
  }
  .wordmark .b { color: var(--fg-primary); }
  .wordmark .down { color: var(--accent-highlight); }
  .meta {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--fg-secondary);
    line-height: 1.8;
  }
  .meta b { color: var(--fg-primary); font-weight: 600; }
  .row { display: flex; gap: 6px; }
  .pill {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid var(--border-default);
    color: var(--fg-secondary);
    background: rgba(203,166,247,0.06);
  }
</style>
</head>
<body>
  <div class="wordmark"><span class="b">break</span><span class="down">Down</span></div>
  <div class="meta">
    <div><b>wordmark</b> · system sans, weight 700</div>
    <div><b>tracking</b> -0.05em · <b>case</b> camelCase, never spaced</div>
    <div class="row" style="margin-top:8px;">
      <span class="pill">breakDown ✓</span>
      <span class="pill" style="text-decoration: line-through; color: var(--fg-tertiary);">Breakdown ✗</span>
      <span class="pill" style="text-decoration: line-through; color: var(--fg-tertiary);">break down ✗</span>
    </div>
  </div>
</body>
</html>

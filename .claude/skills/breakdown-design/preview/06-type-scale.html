<!doctype html>
<!-- @dsCard group="Type" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--bg-page);
    color: var(--fg-primary);
    font-family: 'Space Grotesk', sans-serif;
    padding: 26px 32px;
  }
  .stack { display: grid; gap: 12px; }
  .row { display: grid; grid-template-columns: 110px 1fr 80px; align-items: baseline; gap: 18px; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--fg-secondary); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-tertiary); text-align: right; }
  .h1 { font-size: 30px; font-weight: 600; line-height: 1.2; letter-spacing: -0.02em; }
  .h2 { font-size: 22px; font-weight: 600; line-height: 1.3; letter-spacing: -0.01em; }
  .h3 { font-size: 17px; font-weight: 600; line-height: 1.4; }
  .body { font-size: 14px; font-weight: 400; line-height: 1.6; color: var(--fg-primary); }
  .small { font-size: 12px; line-height: 1.5; color: var(--fg-secondary); }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><span class="tag">H1</span><span class="h1">Settle the trip.</span><span class="meta">30 / 600</span></div>
    <div class="row"><span class="tag">H2</span><span class="h2">Outstanding balances</span><span class="meta">22 / 600</span></div>
    <div class="row"><span class="tag">H3</span><span class="h3">Dinner @ Nobu</span><span class="meta">17 / 600</span></div>
    <div class="row"><span class="tag">body</span><span class="body">Family groups settle together — fewer transactions, simpler accounting.</span><span class="meta">14 / 400</span></div>
    <div class="row"><span class="tag">small</span><span class="small">We collect only your username. No email, no phone.</span><span class="meta">12 / 400</span></div>
  </div>
</body>
</html>

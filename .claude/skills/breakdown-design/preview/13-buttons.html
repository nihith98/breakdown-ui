<!doctype html>
<!-- @dsCard group="Components" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--bg-page);
    color: var(--fg-primary);
    font-family: var(--font-sans);
    padding: 28px 32px;
    box-sizing: border-box;
  }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .lbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--fg-secondary); margin-bottom: 14px; }
  button { font-family: inherit; cursor: pointer; }
  .btn {
    min-height: 44px;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border: none;
    transition: all 0.2s ease;
  }
  .btn.primary { background: var(--accent); color: var(--fg-on-accent); }
  .btn.primary.hover { background: var(--accent-hover); transform: translateY(-1px); }
  .btn.primary.pressed { background: var(--accent-active); }
  .btn.secondary { background: transparent; color: var(--accent-hover); border: 1px solid var(--accent); }
  .btn.danger { background: transparent; color: var(--money-negative); border: 1px solid var(--money-negative); }
  .btn.disabled { opacity: 0.7; cursor: not-allowed; }
  .spinner { display:inline-block; width:12px; height:12px; border:2px solid currentColor; border-top-color:transparent; border-radius:50%; animation: spin 0.8s linear infinite; vertical-align: -1px; margin-right: 6px;}
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="lbl">Buttons</div>
  <div class="row">
    <button class="btn primary">LOG IN</button>
    <button class="btn primary hover">HOVER</button>
    <button class="btn primary pressed">PRESSED</button>
    <button class="btn secondary">CANCEL</button>
    <button class="btn danger">DELETE</button>
    <button class="btn primary disabled" disabled><span class="spinner"></span>LOADING…</button>
  </div>
</body>
</html>

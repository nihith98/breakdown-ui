<!doctype html>
<!-- @dsCard group="Components" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--bg-page);
    color: var(--fg-primary);
    font-family: var(--font-sans);
    padding: 24px 28px;
    box-sizing: border-box;
  }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .label { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--fg-secondary); }
  .input {
    width: 100%;
    padding: 10px 12px;
    background: var(--surface-input);
    border: 1px solid var(--border-default);
    border-radius: 8px;
    color: var(--fg-primary);
    font-family: inherit;
    font-size: 14px;
    box-sizing: border-box;
  }
  .input::placeholder { color: var(--fg-tertiary); }
  .input.focused { border-color: var(--accent); background: var(--surface-input-focus); outline: none; }
  .input.error { border-color: var(--money-negative); }
  .helper { font-size: 12px; color: var(--money-negative); }
</style>
</head>
<body>
  <div class="grid">
    <div class="field">
      <span class="label">Username</span>
      <input class="input" value="trip_lead" />
    </div>
    <div class="field">
      <span class="label">Focused</span>
      <input class="input focused" value="trip_lead" />
    </div>
    <div class="field">
      <span class="label">Error</span>
      <input class="input error" value="" placeholder="Enter your username" />
      <span class="helper">Username is required</span>
    </div>
  </div>
</body>
</html>

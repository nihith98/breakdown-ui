<!doctype html>
<!-- @dsCard group="Colors" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg-page);
    color: var(--fg-primary);
    font-family: var(--font-sans);
    padding: 24px 32px;
    box-sizing: border-box;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }
  .swatch {
    height: 110px;
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    color: var(--fg-primary);
    border: 1px solid var(--border-strong);
  }
  .swatch .name { font-family: var(--font-sans); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--fg-secondary); }
  .swatch .hex  { font-family: var(--font-mono); font-size: 12px; color: var(--fg-primary); }
  .base   { background: #1e1e2e; }
  .deep   { background: #181825; }
  .panel  { background: #1a1a28; }
  .surface{ background: #252539; }
  .surface2{ background: #2d2d44; }
  .input  { background: #1a1a28; }
</style>
</head>
<body>
  <div class="grid">
    <div class="swatch base">
      <span class="name">Page · base</span>
      <span class="hex">#1e1e2e</span>
    </div>
    <div class="swatch panel">
      <span class="name">Panel · sidebar / status</span>
      <span class="hex">#1a1a28</span>
    </div>
    <div class="swatch surface">
      <span class="name">Card surface</span>
      <span class="hex">#252539</span>
    </div>
    <div class="swatch surface2">
      <span class="name">Card · hover</span>
      <span class="hex">#2d2d44</span>
    </div>
  </div>
</body>
</html>

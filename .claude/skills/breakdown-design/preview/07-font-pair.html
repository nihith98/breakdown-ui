<!doctype html>
<!-- @dsCard group="Type" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--bg-page);
    color: var(--fg-primary);
    font-family: var(--font-sans);
    padding: 24px 32px;
  }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  .col { display: grid; gap: 8px; }
  .hed {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--fg-secondary);
  }
  .specimen-sans {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--fg-primary);
    letter-spacing: -0.01em;
  }
  .specimen-mono {
    font-family: var(--font-mono);
    font-size: 16px;
    line-height: 1.5;
    color: var(--fg-primary);
  }
  .specimen-mono em { color: var(--accent-highlight); font-style: italic; }
  .src {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--fg-tertiary);
  }
  .src .ok { color: var(--money-positive); }
</style>
</head>
<body>
  <div class="grid">
    <div class="col">
      <div class="hed">Sans — UI & copy</div>
      <div class="specimen-sans">Aa Bb Cc · Settle up.</div>
      <div class="src"><span class="ok">●</span> Space Grotesk · local file (variable 300–700)</div>
    </div>
    <div class="col">
      <div class="hed">Mono — data & code</div>
      <div class="specimen-mono">{ "amount": <em>-42.33</em> }</div>
      <div class="src"><span class="ok">●</span> JetBrains Mono · local file (variable, roman + italic)</div>
    </div>
  </div>
</body>
</html>
